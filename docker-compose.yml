services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-foliotrak}
      MYSQL_USER: ${DB_USERNAME:-foliotrak}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    ports:
      - "${DB_FORWARD_HOST:-127.0.0.1}:${DB_FORWARD_PORT:-3306}:3306"
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - app-network

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-foliotrak}
      DB_USERNAME: ${DB_USERNAME:-foliotrak}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - .:/var/www/html
    command: php artisan migrate --force --seed
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    restart: no

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    user: "1000:1000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-foliotrak}
      DB_USERNAME: ${DB_USERNAME:-foliotrak}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - .:/var/www/html
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    user: "1000:1000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-foliotrak}
      DB_USERNAME: ${DB_USERNAME:-foliotrak}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - .:/var/www/html
    command: php artisan queue:work
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    user: "1000:1000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-foliotrak}
      DB_USERNAME: ${DB_USERNAME:-foliotrak}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - .:/var/www/html
    command: php artisan schedule:work
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    environment:
      SERVER_NAME: ${NGINX_SERVER_NAME:-_}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
